<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Retour moyen</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(circle at top, rgba(36, 80, 140, 0.22), transparent 35%),
        linear-gradient(180deg, #02050a 0%, #060b14 100%);
      color: #fff;
    }

    .card {
      width: 100%;
      max-width: 560px;
      padding: 32px 22px;
      border-radius: 26px;
      background: rgba(10, 14, 24, 0.85);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 20px 80px rgba(0,0,0,0.45);
      text-align: center;
    }

    .logo {
      font-size: 14px;
      letter-spacing: 2px;
      margin-bottom: 12px;
      opacity: 0.8;
      font-weight: 800;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      font-weight: 800;
    }

    .subtitle {
      font-size: 0.98rem;
      color: rgba(255,255,255,0.72);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .form-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: left;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: #fff;
      font-size: 1rem;
    }

    .check-item input[type="checkbox"] {
      transform: scale(1.1);
      accent-color: #f0ad00;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
      color: #fff;
      font-size: 1rem;
      resize: vertical;
      outline: none;
      font-family: inherit;
    }

    textarea::placeholder {
      color: rgba(255,255,255,0.48);
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 10px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 58px;
      padding: 14px 18px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 800;
      font-size: 1rem;
      transition: 0.18s ease;
      border: 1px solid transparent;
    }

    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    .btn-public {
      background: linear-gradient(180deg, #ffcb2f 0%, #f0ad00 100%);
      color: #1c1400;
      box-shadow: 0 0 22px rgba(255, 203, 47, 0.22);
    }

    .btn-private {
      background: rgba(255,255,255,0.05);
      color: #fff;
      border-color: rgba(255,255,255,0.12);
    }

    .btn-private:hover {
      background: rgba(255,255,255,0.09);
    }

    .back {
      margin-top: 22px;
      display: inline-block;
      font-size: 0.92rem;
      color: rgba(255,255,255,0.62);
      text-decoration: none;
    }

    .back:hover {
      color: #fff;
    }

    @media (max-width: 520px) {
      .card {
        padding: 28px 18px;
        border-radius: 22px;
      }

      h1 {
        font-size: 1.7rem;
      }
    }
  </style>
</head>
<body>

  <main class="card">
    <div class="logo">FLUXORCA</div>

    <h1>Merci pour votre retour</h1>
    <p class="subtitle">
      Dites-nous ce qu’on pourrait améliorer pour vous offrir une meilleure expérience.
    </p>

    <div class="form-box">
      <label class="check-item">
        <input type="checkbox" name="problem" value="Accueil">
        <span>Accueil</span>
      </label>

      <label class="check-item">
        <input type="checkbox" name="problem" value="Service">
        <span>Service</span>
      </label>

      <label class="check-item">
        <input type="checkbox" name="problem" value="Qualité">
        <span>Qualité</span>
      </label>

      <label class="check-item">
        <input type="checkbox" name="problem" value="Autre">
        <span>Autre</span>
      </label>

      <textarea placeholder="Expliquez librement ce qui pourrait être amélioré..."></textarea>

      <div class="actions">
        <a href="public.html" class="btn btn-public">💎 Publier en public</a>
        <a href="merci-prive.html" class="btn btn-private">📩 Envoyer en privé</a>
      </div>
    </div>

    <a href="index.html" class="back">← Retour</a>
  </main>

</body>
</html>
