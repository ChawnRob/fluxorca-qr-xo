<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Retour moyen</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(circle at top, rgba(36, 80, 140, 0.22), transparent 35%),
        linear-gradient(180deg, #02050a 0%, #060b14 100%);
      color: #fff;
    }

    .card {
      width: 100%;
      max-width: 560px;
      padding: 32px 22px;
      border-radius: 26px;
      background: rgba(10, 14, 24, 0.86);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 20px 80px rgba(0,0,0,0.45);
      text-align: center;
    }

    .logo {
      font-size: 14px;
      letter-spacing: 2px;
      margin-bottom: 12px;
      opacity: 0.8;
      font-weight: 800;
    }

    h1 {
      font-size: 1.9rem;
      margin-bottom: 10px;
      font-weight: 800;
    }

    .subtitle {
      font-size: 0.97rem;
      color: rgba(255,255,255,0.7);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .form-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: left;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: #fff;
      font-size: 1rem;
    }

    .check-item input[type="checkbox"] {
      transform: scale(1.1);
      accent-color: #7b8cff;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
      color: #fff;
      font-size: 1rem;
      resize: vertical;
      outline: none;
      font-family: inherit;
    }

    textarea::placeholder {
      color: rgba(255,255,255,0.45);
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 10px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 56px;
      padding: 14px 18px;
      border-radius: 16px;
      font-weight: 800;
      font-size: 1rem;
      transition: 0.18s ease;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.07);
      color: #fff;
      cursor: pointer;
      text-decoration: none;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.13);
    }

    .divider {
      text-align: center;
      color: rgba(255,255,255,0.35);
      font-size: 0.85rem;
      margin: 4px 0;
    }

    .back {
      margin-top: 20px;
      display: inline-block;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.55);
      text-decoration: none;
    }

    .back:hover { color: #fff; }

    @media (max-width: 520px) {
      .card { padding: 28px 18px; border-radius: 22px; }
      h1 { font-size: 1.65rem; }
    }
  </style>
  <script src="js/tracker.js"></script>
</head>
<body>

  <main class="card">
    <div class="logo">FLUXORCA</div>

    <h1>Dites-nous ce qui manquait 😐</h1>
    <p class="subtitle">
      Votre retour nous aide à progresser. Vous pouvez le partager en privé ou publiquement.
    </p>

    <div class="form-box">
      <label class="check-item">
        <input type="checkbox" name="problem" value="Accueil"><span>Accueil</span>
      </label>
      <label class="check-item">
        <input type="checkbox" name="problem" value="Service"><span>Service</span>
      </label>
      <label class="check-item">
        <input type="checkbox" name="problem" value="Food"><span>Food</span>
      </label>
      <label class="check-item">
        <input type="checkbox" name="problem" value="Autre"><span>Autre</span>
      </label>

      <textarea id="msg" placeholder="Décrivez ce qui pourrait être amélioré..."></textarea>

      <div class="actions">
        <button class="btn" onclick="envoyerFeedback('prive')">🔒 Envoyer en privé</button>
        <div class="divider">ou</div>
        <button class="btn" onclick="envoyerFeedback('public')">📍 Partager sur Google Maps</button>
        <button class="btn" onclick="envoyerFeedback('apple')">🍏 Partager sur Apple Plans</button>
      </div>
    </div>

    <a href="index.html" class="back">← Retour</a>
  </main>

  <script>
    injectSessionParams();

    const PLATFORM_URLS = {
      public: "https://www.google.com/maps/place/Le+Royal+Trinit%C3%A9",
      apple:  "https://maps.apple.com/?q=Le+Royal+Trinité",
    };

    let envoiEnCours = false;

    function envoyerFeedback(canal) {
      if (envoiEnCours) return;
      envoiEnCours = true;

      const message = document.getElementById("msg").value;
      const motifs = Array.from(document.querySelectorAll('input[name="problem"]:checked'))
        .map(el => el.value).join(", ");

      document.querySelectorAll(".btn").forEach(btn => {
        btn.disabled = true;
        btn.style.opacity = "0.6";
      });

      track({
        choix   : "moyen",
        canal   : canal === "prive" ? "prive" : "public",
        motifs  : motifs,
        message : message,
      }).then(() => {
        if (canal === "prive") {
          window.location.href = "merci-prive.html";
        } else {
          window.location.href = PLATFORM_URLS[canal] || PLATFORM_URLS.public;
        }
      }).catch(() => {
        // Rediriger quand même en cas d'erreur réseau
        if (canal === "prive") {
          window.location.href = "merci-prive.html";
        } else {
          window.location.href = PLATFORM_URLS[canal] || PLATFORM_URLS.public;
        }
      });
    }
  </script>
</body>
</html>
