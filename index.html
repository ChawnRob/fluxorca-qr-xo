<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fluxorca QR XO</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(circle at top, rgba(36, 80, 140, 0.25), transparent 35%),
        radial-gradient(circle at bottom, rgba(0, 255, 170, 0.08), transparent 30%),
        linear-gradient(180deg, #02050a 0%, #060b14 100%);
      color: #ffffff;
    }

    .card {
      width: 100%;
      max-width: 560px;
      padding: 34px 24px 26px;
      border-radius: 28px;
      background: rgba(10, 14, 24, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.02) inset,
        0 20px 80px rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);
      text-align: center;
    }

    .logo {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 1.8px;
      color: rgba(255,255,255,0.8);
      margin-bottom: 14px;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.05;
      margin-bottom: 14px;
      font-weight: 800;
    }

    .subtitle {
      font-size: 1rem;
      line-height: 1.5;
      color: rgba(255,255,255,0.72);
      margin-bottom: 28px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 22px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 66px;
      padding: 16px 20px;
      border-radius: 18px;
      text-decoration: none;
      font-size: 1.08rem;
      font-weight: 800;
      color: #fff;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
      border: 1px solid transparent;
    }

    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    .btn-excellent {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .btn-average {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .btn-bad {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.13);
    }

    .channels {
      margin-top: 8px;
      color: rgba(255,255,255,0.55);
      font-size: 0.95rem;
    }

    .channel-icons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 0.92rem;
      color: rgba(255,255,255,0.78);
    }

    @media (max-width: 520px) {
      .card {
        padding: 28px 18px 22px;
        border-radius: 22px;
      }

      .btn {
        min-height: 60px;
        font-size: 1rem;
      }
    }
  </style>
  <script src="js/tracker.js"></script>
</head>
<body>
  <main class="card">
    <div class="logo">FLUXORCA</div>

    <h1>Comment s'est passée votre expérience ?</h1>
    <p class="subtitle">
      Votre retour nous aide à mieux comprendre votre passage et à améliorer l'expérience.
    </p>

    <div class="buttons">
      <a href="excellent.html" class="btn btn-excellent">😍 Excellente</a>
      <a href="moyenne.html" class="btn btn-average">😐 Moyenne</a>
      <a href="mauvaise.html" class="btn btn-bad">😡 Mauvaise</a>
    </div>

    <div class="channels">Avis diffusé sur</div>
    <div class="channel-icons">
      <span class="chip">📍 Google Maps</span>
      <span class="chip">🍏 Apple Plans</span>
      <span class="chip">📸 Instagram</span>
    </div>
  </main>

  <script>
    // Injecte ?client=X&table=Y dans tous les liens de navigation
    injectSessionParams();

    // Track la vue de la page d'accueil
    track({ choix: "vue_index", canal: "" });
  </script>
</body>
</html>
