<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Merci 🙏</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(circle at top, rgba(36, 80, 140, 0.25), transparent 35%),
        linear-gradient(180deg, #02050a 0%, #060b14 100%);
      color: #fff;
    }

    .card {
      width: 100%;
      max-width: 520px;
      padding: 32px 22px;
      border-radius: 26px;
      background: rgba(10, 14, 24, 0.85);
      border: 1px solid rgba(255,255,255,0.08);
      text-align: center;
      box-shadow: 0 20px 80px rgba(0,0,0,0.45);
    }

    .logo {
      font-size: 14px;
      letter-spacing: 2px;
      margin-bottom: 12px;
      opacity: 0.8;
      font-weight: 800;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.7);
      margin-bottom: 26px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: block;
      padding: 16px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      transition: 0.2s;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.1);
    }

    .google { background: #1a3d1f; }
    .apple { background: #1a1a1a; }
    .trust { background: #11352b; }

    .back {
      margin-top: 22px;
      display: inline-block;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
    }

    .back:hover {
      color: white;
    }

  </style>
</head>
<body>

  <div class="card">
    <div class="logo">FLUXORCA</div>

    <h1>Merci beaucoup 🙏</h1>
    <p class="subtitle">
      Si vous avez apprécié votre expérience, vous pouvez la partager ici :
    </p>

    <div class="buttons">
      <a href="TON_LIEN_GOOGLE" target="_blank" class="btn google">📍 Google Maps</a>
      <a href="TON_LIEN_APPLE" target="_blank" class="btn apple">🍏 Apple Plans</a>
      <a href="TON_LIEN_TRUSTPILOT" target="_blank" class="btn trust">⭐ Trustpilot</a>
    </div>

    <a href="index.html" class="back">← Retour</a>
  </div>

</body>
</html>
