<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Merci 🙏</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(circle at top, rgba(36, 80, 140, 0.25), transparent 35%),
        linear-gradient(180deg, #02050a 0%, #060b14 100%);
      color: #fff;
    }

    .card {
      width: 100%;
      max-width: 520px;
      padding: 32px 22px;
      border-radius: 26px;
      background: rgba(10, 14, 24, 0.85);
      border: 1px solid rgba(255,255,255,0.08);
      text-align: center;
      box-shadow: 0 20px 80px rgba(0,0,0,0.45);
    }

    .logo {
      font-size: 14px;
      letter-spacing: 2px;
      margin-bottom: 12px;
      opacity: 0.8;
      font-weight: 800;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.7);
      margin-bottom: 26px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: block;
      padding: 16px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.07);
      transition: 0.2s;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.13);
    }

  </style>
  <script src="js/tracker.js"></script>
</head>
<body>

  <div class="card">
    <div class="logo">FLUXORCA</div>

    <h1>Merci beaucoup 🙏</h1>
    <p class="subtitle">
      Si vous avez apprécié votre expérience, vous pouvez la partager ici :
    </p>

    <div class="buttons">
      <a id="btn-google" href="#" target="_blank" class="btn" onclick="trackEtOuvrir(event, 'google')">
        📍 Google Maps
      </a>
      <a id="btn-apple" href="#" target="_blank" class="btn" onclick="trackEtOuvrir(event, 'apple')">
        🍏 Apple Plans
      </a>
    </div>
  </div>

  <script>
    const PLATFORM_URLS = {
      google: "https://www.google.com/maps/place/Le+Royal+Trinit%C3%A9",
      apple:  "https://maps.apple.com/?q=Le+Royal+Trinité",
    };

    // Track le chargement de la page excellent
    track({ choix: "excellent", canal: "page_chargee" });

    document.getElementById("btn-google").href = PLATFORM_URLS.google;
    document.getElementById("btn-apple").href  = PLATFORM_URLS.apple;

    function trackEtOuvrir(event, plateforme) {
      track({ choix: "excellent", canal: "public", motifs: plateforme });
    }
  </script>
</body>
</html>
