<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Merci 🙏</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(circle at top, rgba(40, 90, 140, 0.18), transparent 35%),
        linear-gradient(180deg, #02050a 0%, #060b14 100%);
      color: #fff;
    }

    .card {
      width: 100%;
      max-width: 520px;
      padding: 34px 24px;
      border-radius: 26px;
      background: rgba(10, 14, 24, 0.85);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 20px 80px rgba(0,0,0,0.45);
      text-align: center;
    }

    .logo {
      font-size: 14px;
      letter-spacing: 2px;
      margin-bottom: 14px;
      opacity: 0.8;
      font-weight: 800;
    }

    h1 {
      font-size: 1.9rem;
      margin-bottom: 14px;
      font-weight: 800;
    }

    .message {
      font-size: 1rem;
      line-height: 1.6;
      color: rgba(255,255,255,0.78);
      margin-bottom: 28px;
    }

    .btn {
      display: inline-block;
      padding: 14px 22px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
      transition: 0.2s;
    }

    .btn:hover {
      background: rgba(255,255,255,0.14);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">FLUXORCA</div>
    <h1>Merci pour votre retour 🙏</h1>

    <p class="message">
      Merci de votre contribution et de votre indulgence.<br><br>
      Votre message nous aide à nous améliorer et à vous offrir une meilleure expérience lors de votre prochain passage.
    </p>

    <a href="index.html" class="btn">Retour à l’accueil</a>
  </div>
</body>
</html>
